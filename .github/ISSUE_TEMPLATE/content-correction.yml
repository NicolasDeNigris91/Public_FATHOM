name: Correção de conteúdo
description: Erro técnico, typo, link quebrado, ou imprecisão em algum módulo / doc.
labels: ['content', 'triage']
body:
  - type: input
    id: target
    attributes:
      label: Onde
      description: Caminho do arquivo (ex: framework/01-novice/N04-data-structures.md) ou URL do site (ex:/modules/n04#secao).
      placeholder: framework/04-senior/S01-distributed-systems-theory.md§2.5
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Problema
      description: O que está errado, ambíguo, ou desatualizado? Cite o trecho exato se possível.
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Sugestão (opcional)
      description: Como você corrigiria? Pode ser fonte canônica que contradiz, ou texto alternativo.
  - type: dropdown
    id: severity
    attributes:
      label: Severidade
      options:
        - typo / link quebrado
        - imprecisão técnica
        - erro grave (bloqueia entendimento)
    validations:
      required: true
