name: Module gap / proposta de aprofundamento
description: Subtopic faltando em módulo existente, ou proposta de módulo novo.
labels: ['content', 'enhancement', 'triage']
body:
  - type: dropdown
    id: kind
    attributes:
      label: Tipo
      options:
        - subtopic faltando em módulo existente
        - módulo novo proposto
        - capstone gap
    validations:
      required: true
  - type: input
    id: target
    attributes:
      label: Módulo afetado (ou estágio onde encaixaria)
      placeholder: 'A09 (subtopic) ou Senior (módulo novo S17)'
    validations:
      required: true
  - type: textarea
    id: gap
    attributes:
      label: Lacuna identificada
      description: O que falta? Por que isto separa "Senior real" de "Senior superficial"?
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Fonte canônica que cobre
      description: Livros, papers, RFCs, codebases que justificam inclusão. Sem fonte de elite, não vira módulo.
    validations:
      required: true
  - type: textarea
    id: prereqs
    attributes:
      label: Prereqs sugeridos
      description: Quais módulos existentes seriam prereq?
  - type: markdown
    attributes:
      value: |
        Adições estruturais (módulo novo, mudança de prereqs, etc) entram via **DECISION-LOG entry**. Veja `framework/00-meta/DECISION-LOG.md` pra padrão.
