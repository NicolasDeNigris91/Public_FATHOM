version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: scope
    labels: ["dependencies", "ci"]
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /apps/site
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(site)"
      include: scope
    labels: ["dependencies", "npm", "site"]
    groups:
      site-minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: docker
    directory: /apps/site
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps(docker)"
      include: scope
    labels: ["dependencies", "docker"]
