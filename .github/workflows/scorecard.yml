name: OpenSSF Scorecard

# Runs the OpenSSF Scorecard analyzer to score this repository against
# supply-chain security best practices (branch protection, signed releases,
# dependency pinning, fuzzing, etc). Results are uploaded to GitHub's code
# scanning view and (optionally) to the OpenSSF Scorecard public dataset.
# https://github.com/ossf/scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: '37 4 * * 1'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: scorecard-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 7

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@5e316336eb4f107009e477d4bfbfff13d7250fae # v4
        with:
          sarif_file: results.sarif
