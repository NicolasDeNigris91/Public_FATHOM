name: a11y

on:
  push:
    branches: [main]
    paths:
      - 'apps/site/**'
      - 'framework/**'
      - '.github/workflows/a11y.yml'
  pull_request:
    branches: [main]

jobs:
  a11y:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'apps/site/package-lock.json'

      - name: Install dependencies
        working-directory: apps/site
        run: npm ci --no-audit --no-fund

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/site/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright Chromium
        working-directory: apps/site
        run: npx playwright install --with-deps chromium

      - name: Run a11y tests
        # Uses `next dev` via Playwright webServer (see playwright.config.ts).
        # Dev mode is the most reliable way to serve CSS correctly across
        # standalone-vs-non-standalone Next configs.
        working-directory: apps/site
        run: npm run test:a11y
        env:
          CI: 'true'
          PORT: '3000'
          NEXT_PUBLIC_SITE_URL: https://fathom.nicolaspilegidenigris.dev

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-a11y-report
          path: apps/site/playwright-report
          retention-days: 14
