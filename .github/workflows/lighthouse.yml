name: Lighthouse CI

# Runs Lighthouse against representative routes on every PR. Fails the
# job if performance, accessibility, best-practices, or SEO drop below
# the thresholds in .lighthouserc.json. Treats the site as static — runs
# `next build` then serves locally.

on:
  push:
    branches: [main]
    paths:
      - 'apps/site/**'
      - '.github/workflows/lighthouse.yml'
      - '.lighthouserc.json'
  pull_request:
    branches: [main]
    paths:
      - 'apps/site/**'
      - '.github/workflows/lighthouse.yml'
      - '.lighthouserc.json'

permissions:
  contents: read

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'apps/site/package-lock.json'

      - name: Install
        working-directory: apps/site
        run: npm ci --no-audit --no-fund

      - name: Build
        working-directory: apps/site
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://fathom.nicolaspilegidenigris.dev

      - name: Stage standalone static assets
        # `output: 'standalone'` (next.config.ts) does NOT copy
        # `.next/static` or `public/` into the standalone tree — that
        # is the user's responsibility per the Next.js docs. Without
        # this step the standalone server boots but every page returns
        # HTML referencing /_next/static/* chunks that 404, so the page
        # renders unstyled and lhci's axe audit sees default-colored
        # text on the inline-styled dark body — fails color-contrast
        # on every element.
        run: |
          cp -r apps/site/.next/static apps/site/.next/standalone/apps/site/.next/static
          cp -r apps/site/public apps/site/.next/standalone/apps/site/public

      - name: Run Lighthouse CI
        # Repo-root cwd so lhci picks up `.lighthouserc.json`, whose
        # `startServerCommand` is written relative to the repo root
        # (`node apps/site/.next/standalone/apps/site/server.js`).
        run: npx --yes @lhci/cli@0.14.0 autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
