name: build site

on:
  push:
    branches: [main]
    paths:
      - 'apps/site/**'
      - 'framework/**'
      - 'README.md'
      - 'MENTOR.md'
      - 'STUDY-PROTOCOL.md'
      - 'PROGRESS.md'
      - 'scripts/**'
      - '.github/workflows/build-site.yml'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'apps/site/package-lock.json'
      - name: Install
        working-directory: apps/site
        run: npm ci --no-audit --no-fund
      - name: Typecheck
        working-directory: apps/site
        run: npm run typecheck
      - name: Lint
        working-directory: apps/site
        run: npm run lint
      - name: Run tests
        working-directory: apps/site
        run: npm test
      - name: Build (includes prebuild validation)
        working-directory: apps/site
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://fathom.nicolaspilegidenigris.dev
