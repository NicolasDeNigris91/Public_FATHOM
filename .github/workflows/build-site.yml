name: build site

on:
  push:
    branches: [main]
    paths:
      - 'apps/site/**'
      - 'framework/**'
      - 'README.md'
      - 'MENTOR.md'
      - 'STUDY-PROTOCOL.md'
      - 'PROGRESS.md'
      - 'scripts/**'
      - '.github/workflows/build-site.yml'
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: build-site-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'apps/site/package-lock.json'
      - name: Install
        working-directory: apps/site
        run: npm ci --no-audit --no-fund
      - name: Typecheck
        working-directory: apps/site
        run: npm run typecheck
      - name: Lint
        working-directory: apps/site
        run: npm run lint
      - name: Run tests with coverage
        working-directory: apps/site
        run: npm run test:coverage
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: apps/site/coverage
          retention-days: 14
      - name: Build (includes prebuild validation)
        working-directory: apps/site
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://fathom.nicolaspilegidenigris.dev
